name: Generate and Deploy Chart

on:
  push:
    paths:
      - 'Final_Demand_Data.csv'
      - 'generate_final_chart.py'
      - '.github/workflows/main.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install pandas plotly

      - name: Generate chart
        run: python generate_final_chart.py

      - name: Prepare artifact directory
        run: |
          rm -rf public
          mkdir public
          cp final_demand_chart.html public/index.html
          ls -R public

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'public'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4